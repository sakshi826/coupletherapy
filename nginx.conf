worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Correct MIME types explicitly (belt-and-suspenders)
  types {
    text/css                 css;
    application/javascript   js mjs;
    application/json         json;
    image/svg+xml            svg svgz;
    font/woff                woff;
    font/woff2               woff2;
    image/png                png;
    image/webp               webp;
    image/jpeg               jpg jpeg;
    image/x-icon             ico;
  }

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml font/woff font/woff2;

  server {
    listen 3000;
    server_name _;

    # Serve static assets directly from the Nitro public dir
    root /app/.output/public;

    # Long-lived cache for fingerprinted assets
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Other static files in public root (favicon, manifest, etc.)
    location ~* \.(ico|png|svg|webp|woff|woff2|jpg|jpeg|json|txt|xml)$ {
      add_header Cache-Control "public, max-age=86400";
      try_files $uri @ssr;
    }

    # Everything else → Nitro SSR Node.js server
    location / {
      proxy_pass         http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location @ssr {
      proxy_pass         http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
