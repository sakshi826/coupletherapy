worker_processes auto;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  # Load the full system MIME database.
  # IMPORTANT: do NOT add a separate types{} block — it would override (not merge with) this include.
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_types text/css application/javascript application/json image/svg+xml
             font/woff font/woff2 text/plain text/xml;

  server {
    listen 80;
    server_name _;

    # Nitro's compiled static assets live here
    root /app/.output/public;

    # ── CSS assets — explicit Content-Type header (belt-and-suspenders) ──────
    location ~* ^/coupletherapy/assets/(.*\.css)$ {
      alias /app/.output/public/assets/$1;
      add_header Content-Type "text/css; charset=utf-8" always;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── JS/MJS assets ─────────────────────────────────────────────────────────
    location ~* ^/coupletherapy/assets/(.*\.(js|mjs))$ {
      alias /app/.output/public/assets/$1;
      add_header Content-Type "application/javascript; charset=utf-8" always;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Other fingerprinted assets (fonts, images, etc.) ─────────────────────
    location /coupletherapy/assets/ {
      alias /app/.output/public/assets/;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Other static public files (favicon, manifest, etc.) ──────────────────
    location ~* \.(ico|png|svg|webp|woff|woff2|jpg|jpeg|txt|xml|map)$ {
      add_header Cache-Control "public, max-age=86400";
      try_files $uri @ssr;
    }

    # ── Everything else → Nitro SSR Node.js server ───────────────────────────
    location / {
      proxy_pass         http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location @ssr {
      proxy_pass         http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
